<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AXOO B2G Dashboard</title>
  <link rel="stylesheet" href="style.css?v=116" />
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <div>
        <p class="eyebrow">AXOO B2G ENGINE</p>
        <h1>공공 프로젝트 자동 리서치 대시보드</h1>
        <p class="subtitle">나라장터 기반 맞춤 공고, 기관 타깃, 건축물 미술작품 후보를 한눈에 관리합니다.</p>
      </div>

      <div class="header-update-card">
        <span id="lastUpdatedAt">최근 업데이트 : -</span>
      </div>
    </div>
  </header>

  <main class="container">
    <section class="summary-panel">
      <div class="summary-panel-head">
        <h2>현황 요약</h2>
      </div>

      <section class="meta-bar">
        <div class="meta-card">
          <div class="meta-label">❤️나라장터 공고</div>
          <div class="meta-value" id="metaOpportunityCount">0</div>
        </div>

        <div class="meta-card">
          <div class="meta-label">💙건축물 미술작품</div>
          <div class="meta-value" id="metaArtCount">0</div>
        </div>

        <div class="meta-card">
          <div class="meta-label">🎯기관 타깃</div>
          <div class="meta-value" id="metaAgencyCount">0</div>
        </div>
      </section>

      <section class="summary-grid">
        <div class="summary-card">
          <span>전체</span>
          <strong id="totalCount">0</strong>
        </div>

        <div class="summary-card">
          <span>S등급</span>
          <strong id="sCount">0</strong>
        </div>

        <div class="summary-card">
          <span>A등급</span>
          <strong id="aCount">0</strong>
        </div>

        <div class="summary-card">
          <span>B등급</span>
          <strong id="bCount">0</strong>
        </div>
      </section>
    </section>

    <nav class="tabs">
      <button class="tab-button active" data-tab="opportunities">❤️나라장터 공고</button>
      <button class="tab-button" data-tab="art">💙건축물 미술작품</button>
      <button class="tab-button" data-tab="agencies">🎯기관 타깃</button>
    </nav>

    <section id="opportunitiesTab" class="tab-panel active">
      <section class="filters">
        <input id="searchInput" type="text" placeholder="공고명, 기관명, 키워드 검색" />

        <select id="gradeFilter">
          <option value="all">전체 등급</option>
          <option value="S">S등급</option>
          <option value="A">A등급</option>
          <option value="B">B등급</option>
        </select>

        <select id="categoryFilter">
          <option value="all">전체 분야</option>
          <option value="public_art">공공미술</option>
          <option value="media_art">미디어아트</option>
          <option value="exhibition">전시</option>
          <option value="festival">문화행사</option>
          <option value="design">공공디자인</option>
          <option value="tourism">관광콘텐츠</option>
          <option value="general">기타</option>
        </select>

        <select id="reviewFilter">
          <option value="all">전체 상태</option>
          <option value="new">미검토</option>
          <option value="hold">보류</option>
          <option value="reviewing">검토중</option>
          <option value="proposal">제안 준비</option>
          <option value="done">제안 완료</option>
        </select>
      </section>

      <div class="list-head">
        <span class="list-source-grade">
          <em>출처</em>
          <em>공고등급</em>
        </span>
        <span>공모명</span>
        <span>게재기간</span>
        <span>마감일</span>
      </div>

      <section id="cards" class="cards"></section>
      <p id="emptyMessage" class="empty-message">조건에 맞는 공고가 없습니다.</p>
    </section>

    <section id="artTab" class="tab-panel">
      <section class="filters">
        <input id="artSearchInput" type="text" placeholder="공모명, 기관명, 키워드 검색" />

        <select id="artSourceFilter">
          <option value="all">전체 출처</option>
          <option value="서울">서울</option>
          <option value="경기도">경기도</option>
          <option value="LH/SH">LH/SH</option>
        </select>

        <select id="artReviewFilter">
          <option value="all">전체 상태</option>
          <option value="new">미검토</option>
          <option value="hold">보류</option>
          <option value="reviewing">검토중</option>
          <option value="proposal">제안 준비</option>
          <option value="done">제안 완료</option>
        </select>
      </section>

      <div class="list-head">
        <span>출처</span>
        <span>공모명</span>
        <span>게재기간</span>
        <span>마감일</span>
      </div>

      <section id="artCards" class="cards"></section>
    </section>

    <section id="agenciesTab" class="tab-panel">
      <section class="section-head">
        <div>
          <h2>기관 타깃</h2>
          <p>공고와 계약 이력을 바탕으로 우선 접촉할 기관을 정리합니다.</p>
        </div>
      </section>

      <section id="agencyCards" class="cards"></section>
    </section>
  </main>

  <script src="app.js?v=99"></script>
  <script src="dashboard_ui_update.js?v=13"></script>
</body>
</html>
